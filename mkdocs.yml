site_name: OpsDeck
site_description: FastAPI-native admin for async SQLAlchemy teams.
site_url: https://rasinmuhammed.github.io/opsdeck/
repo_url: https://github.com/rasinmuhammed/opsdeck
repo_name: rasinmuhammed/opsdeck
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Palette toggle for dark mode
    - scheme: slate
      primary: green
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    # Palette toggle for light mode
    - scheme: default
      primary: green
      accent: lime
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html

plugins:
  - search

nav:
  - Home: index.md
  - AI Assistants: ai-assistants.md
  - Guide:
      - Getting Started: guide/getting-started.md
      - Configuration: guide/configuration.md
      - Migration Notes: guide/migration.md
      - Integrations: guide/integrations.md
  - Recipes:
      - Auth And Audit: recipes/auth-and-audit.md
      - Multi-Tenant Scoping: recipes/multi-tenant-scoping.md
      - Actions And Ops: recipes/actions-and-ops.md
      - AI-Friendly Integration: recipes/ai-friendly-integration.md
  - Features: features.md
  - Comparison: comparison.md
  - FAQ: faq.md
  - API Reference: api.md
  - Contributing: contributing.md

extra:
  generator: false
  homepage: https://rasinmuhammed.github.io/opsdeck/
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rasinmuhammed
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/rasinmuhammed
